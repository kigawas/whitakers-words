<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whitaker's Words</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" as="style" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="page">
    <header>
      <h1>Whitaker's Words</h1>
      <p class="subtitle">A Latin morphological analyzer & dictionary</p>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode"></button>
      <div class="rule"><span class="rule-ornament"></span></div>
    </header>

    <main>
      <div class="search-area">
        <div class="input-wrap">
          <input id="word-input" type="text" placeholder="Enter Latin — e.g. aquam, regina, amo, bellum, fatus est" disabled autofocus />
          <button id="parse-btn" disabled>Parse</button>
        </div>
        <div id="status" class="status">Loading dictionary&hellip;</div>
      </div>

      <div id="results" class="results"></div>
    </main>

    <footer>
      <div class="rule"><span class="rule-ornament"></span></div>
      <p class="colophon">
        <a href="https://github.com/kigawas/whitakers-words" class="source-link" target="_blank" rel="noopener">Open source on GitHub</a><br />
        Based on <strong>WORDS</strong> by Col. William Whitaker (1936 &ndash; 2010)<br />
        <span class="latin-motto">Verborum vis est magna.</span>
      </p>
    </footer>
  </div>

  <script type="module" src="/script.js"></script>
</body>

</html>
